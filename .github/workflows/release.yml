name: Release

on:
    workflow_dispatch:
        inputs:
            major_minor:
                description: "Major/Minor version"
                required: true
                default: "0.6"

jobs:
    build-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Calculate Version String
              run: |
                  COMMITS=$(git rev-list --count --all || echo 0)
                  VERSION=v${{ github.event.inputs.major_minor }}.${COMMITS}
                  echo RELEASE_TAG=${VERSION} >> $GITHUB_ENV

            - name: Generate Changelog
              id: build_changelog
              uses: mikepenz/release-changelog-builder-action@v6
              with:
                  configuration: ".github/release-changelog-config.json"
                  toTag: ${{ github.ref_name }}
                  mode: "HYBRID"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # - name: Log Changelog output
            #   run: |
            #       cat << 'EOF'
            #           ${{ steps.build_changelog.outputs.changelog }}
            #       EOF

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ steps.build_changelog.outputs.changelog }}
                  prerelease: ${{ github.ref_name != 'main' }}
                  make_latest: ${{ github.ref_name == 'main' && 'true' || 'false' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
