services:
  dockwatch:
    container_name: dockwatch-dev
    image: ghcr.io/notifiarr/dockwatch:nightly
    restart: unless-stopped
    ports:
      - 10000:80/tcp
    environment:
      - PUID=1000
      - PGID=990
      - TZ=America/New_York
      - BASE_URL=/dockwatch
    volumes:
      - ./data:/config
      - ./root/app/www/public:/app/www/public
      - /var/run/docker.sock:/var/run/docker.sock